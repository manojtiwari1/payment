



# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_platform?serverTimezone=UTC
spring.datasource.username=postgres
spring.datasource.password=root

# JPA and Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cors configuration
app.cors.allowed.url=http://localhost:4200

# File upload configuration (bytes)  15 MB
file.upload.max-size=15728640



# Jwt configuration
security.jwt.secret-key=V29ya2VkVjJTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjU=
security.jwt.expiration=3600000
security.jwt.refresh-token.expiration=604800000

# Bootstrap admin + sample merchant (only seeds when the users table is empty)
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@payment.local
app.bootstrap.admin.password=Admin@12345
app.bootstrap.admin.first-name=System
app.bootstrap.admin.last-name=Administrator
app.bootstrap.admin.role-slug=ADMIN
app.bootstrap.merchant.email=merchant@payment.local
app.bootstrap.merchant.password=Merchant@12345
app.bootstrap.merchant.code=M123
app.bootstrap.merchant.role-slug=MERCHANT

# Payment routing ordered PSP list per merchant (failover left to right); default for others
payment.routing.default-providers=PSP_A,PSP_B
payment.routing.merchants.M123=PSP_A,PSP_B
# Demo route to exercise reconciliation: a PSP that times out leaves the payment stuck in PROCESSING
payment.routing.merchants.M_STUCK=PSP_C

# PSP simulation � PSP_A fails (transient) -> failover to PSP_B (success); PSP_C times out (indeterminate)
payment.psp.providers.PSP_A.outcome=TRANSIENT_FAILURE
payment.psp.providers.PSP_B.outcome=SUCCESS
payment.psp.providers.PSP_C.outcome=TIMEOUT

# Reconciliation  hourly; treats payments stuck in PROCESSING beyond the threshold; assumes SUCCESS
payment.reconciliation.cron=0 0 * * * *
payment.reconciliation.stuck-threshold-minutes=120
payment.reconciliation.assumed-status=SUCCESS

# Kafka - domain events relayed from the transactional outbox
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.max.block.ms=5000
payment.outbox.topic=payment-events
payment.outbox.poll-delay-ms=5000

# Resilience4j (programmatic) - circuit breaker per PSP, rate limiter per merchant
payment.resilience.cb.failure-rate-threshold=50
payment.resilience.cb.open-state-seconds=30
payment.resilience.cb.sliding-window-size=10
payment.resilience.cb.minimum-calls=5
payment.resilience.rate-limit.per-minute=100



# Redis Port and Host Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=Worked@2025



logging.level.org.springframework.data.repository.config=ERROR

# Include the correlation id (from X-Correlation-Id / CorrelationIdFilter) in every log line
logging.pattern.level=%5p [correlationId=%X{correlationId:-}]

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always